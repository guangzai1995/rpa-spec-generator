version: '3.8'

services:
  rpa-spec:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
      - "8480:8480"
    volumes:
      - rpa-uploads:/app/backend/uploads
      - rpa-results:/app/backend/note_results
      - rpa-static:/app/backend/static
    environment:
      - DATABASE_URL=sqlite:///rpa_spec.db
      - BACKEND_PORT=8480
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8480/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  rpa-uploads:
  rpa-results:
  rpa-static:
